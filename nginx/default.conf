# Nginx reverse proxy for TikBypass
# For production with SSL, uncomment the 443 server block and add cert paths.

upstream tikbypass_backend {
    server app:8000;
}

# Increase upload size limit
client_max_body_size 500m;

server {
    listen 80;
    server_name _;

    # Proxy to FastAPI
    location / {
        proxy_pass http://tikbypass_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long video processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # Static files served directly
    location /static/ {
        proxy_pass http://tikbypass_backend/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check — no buffering
    location /api/health {
        proxy_pass http://tikbypass_backend/api/health;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Download endpoint — streaming
    location /api/download/ {
        proxy_pass http://tikbypass_backend;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
